<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header" id="top"></header>
    <div class="logo">
        <img src="img.jpeg" alt="Logo" class="logo-img" />
        AdhiSristhi
      </div>
    <div class="calculator">
        <div class="display">
            <input type="text" id="display" readonly>
        </div>
        <div class="buttons">
            <button class="btn clear">C</button>
            <button class="btn operator">/</button>
            <button class="btn operator">*</button>
            <button class="btn backspace">⌫</button>
            
            <button class="btn number">7</button>
            <button class="btn number">8</button>
            <button class="btn number">9</button>
            <button class="btn operator">-</button>
            
            <button class="btn number">4</button>
            <button class="btn number">5</button>
            <button class="btn number">6</button>
            <button class="btn operator">+</button>
            
            <button class="btn number">1</button>
            <button class="btn number">2</button>
            <button class="btn number">3</button>
            <button class="btn equals">=</button>
            
            <button class="btn number zero">0</button>
            <button class="btn decimal">.</button>
        </div>
    </div>
    <br>
    <footer class="footer">
    <div class="container footer-inner">
      <p>© 2026 ADHITHYA. Built with HTML, CSS, JS and passion.</p>
      <div class="socials">
        <a href="https://github.com/Adhieeeh" aria-label="GitHub" target="_blank">GitHub</a>
        <a href="www.linkedin.com/in/adhithya-su" aria-label="LinkedIn" target="_blank">LinkedIn</a>
        <a href="https://instagram.com/yourhandle" aria-label="Instagram" target="_blank">Instagram</a>
        <a href="adhitthyasu6@gmail.com" aria-label="E-mail">E-mail</a>
      </div>
    </div>
  </footer>
    <script src="script.js"></script>
</body>
</html>
